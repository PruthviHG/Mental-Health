<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, shrink-to-fit=no">
    <title>Mindsence - Safe Space</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="flex flex-col h-screen selection:bg-cyan-500 selection:text-black">

    <div id="canvas-container"></div>

    <div id="main-ui" class="relative z-10 flex flex-col h-full w-full pointer-events-auto transition-opacity duration-500 opacity-100">
        
        <header class="flex-none py-3 px-4 md:py-4 md:px-6 flex items-center justify-between bg-transparent">
            <div class="flex items-center gap-2 md:gap-3">
                <div class="w-6 h-6 md:w-8 md:h-8 rounded bg-transparent border border-cyan-400 flex items-center justify-center font-bold text-xs md:text-sm shadow-[0_0_10px_rgba(69,243,255,0.4)] text-cyan-400 font-mono flex-shrink-0">M</div>
                <div class="flex flex-col sm:flex-row sm:items-center">
                    <h1 class="text-[13px] md:text-lg font-bold tracking-[0.1em] md:tracking-[0.2em] text-cyan-50 leading-tight">MINDSENCE <span class="inline-block text-[7px] md:text-[9px] font-mono text-cyan-400 align-middle border border-cyan-500/30 rounded px-1 bg-cyan-500/10 tracking-normal ml-0 sm:ml-1 mt-0.5 sm:mt-0">SAFE SPACE</span></h1>
                </div>
            </div>
            <div class="flex items-center gap-2 md:gap-4">
                <button onclick="exportChat()" class="hidden md:block text-[8px] font-mono tracking-widest text-cyan-400 border border-cyan-400/50 hover:bg-cyan-400 hover:text-black px-2 py-1 rounded transition-all">EXPORT LOG</button>
                <button onclick="openArcade()" class="text-[8px] font-mono tracking-widest text-cyan-400 border border-cyan-400/50 hover:bg-cyan-400/10 px-2 py-1 rounded transition-all">GAMES</button>
                <button onclick="openRooms()" class="text-[8px] font-mono tracking-widest text-cyan-400 border border-cyan-400/50 hover:bg-cyan-400/10 px-2 py-1 rounded transition-all">ROOMS</button>
                <div class="flex items-center gap-1 md:gap-2">
                    <div class="w-2 h-2 rounded-full bg-cyan-400 shadow-[0_0_8px_#45f3ff] animate-pulse"></div>
                    <span class="text-[8px] md:text-[10px] text-cyan-400/70 font-mono hidden sm:inline tracking-widest">ONLINE</span>
                </div>
            </div>
        </header>

        <main class="flex-grow overflow-y-auto relative w-full flex flex-col items-center scroll-smooth">
            <div id="chatbox" class="w-full max-w-4xl flex flex-col space-y-6 px-4 py-8 pb-40"></div>
        </main>

        <footer class="fixed bottom-0 inset-x-0 w-full flex justify-center pb-4 md:pb-6 px-2 md:px-4 bg-transparent">
            <div class="w-full max-w-4xl relative group">
                <div class="absolute -inset-0.5 bg-cyan-500 rounded-lg blur opacity-10 group-focus-within:opacity-30 transition duration-500"></div>
                <div class="relative flex items-end gap-1 md:gap-2 bg-[#0b0c10]/95 rounded-lg p-1.5 md:p-2 border border-cyan-500/30 shadow-2xl focus-within:border-cyan-400 transition-colors">
                    
                    <button id="liveVoiceBtn" class="flex-none p-2 rounded bg-transparent border border-cyan-500 text-cyan-400 hover:bg-cyan-500 hover:text-black transition-colors h-[40px] w-[40px] md:h-[44px] md:w-[44px] flex items-center justify-center" title="Live Speech Chat">
                        <i class="fas fa-microphone text-sm md:text-base"></i>
                    </button>

                    <textarea id="messageInput" class="w-full max-h-48 min-h-[40px] md:min-h-[44px] bg-transparent text-gray-100 placeholder-cyan-700/50 px-3 md:px-4 py-2 md:py-2.5 outline-none resize-none leading-relaxed font-mono text-[13px] md:text-sm" placeholder="Message your friend... 🤍" rows="1"></textarea>
                    
                    <button id="sendButton" class="flex-none p-2 rounded bg-transparent border border-cyan-500 text-cyan-400 hover:bg-cyan-500 hover:text-black transition-colors disabled:opacity-50 disabled:cursor-not-allowed h-[40px] w-[40px] md:h-[44px] md:w-[44px] flex items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-4 h-4 md:w-4 md:h-4 -rotate-90">
                            <path d="M3.478 2.404a.75.75 0 00-.926.941l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.404z" />
                        </svg>
                    </button>
                </div>
            </div>
        </footer>
    </div>

    <div id="player-widget">
        <div id="player-toggle" onclick="togglePlayer()">🎵 AUDIO SYNC</div>
        <div id="floating-player">
            <div id="audio-status" class="text-[9px] text-cyan-400 mb-2 font-mono tracking-widest font-bold">/// GITHUB REPO SYNC</div>
            <p id="track-display" class="text-white text-xs font-mono mb-3 truncate w-full">Connecting...</p>
            <div class="flex justify-between items-center mt-2">
                <button id="prev-btn" class="btn">&lt; PREV</button>
                <button id="play-pause-btn" class="btn border-cyan-400 text-cyan-400 px-4"><i class="fas fa-play"></i></button>
                <button id="next-btn" class="btn">NEXT &gt;</button>
            </div>
        </div>
    </div>

    <div id="rooms-modal" class="fixed inset-0 z-[150] hidden bg-black opacity-0 transition-opacity duration-500 font-sans">
        
        <div id="rooms-menu-view" class="r-active absolute inset-0 transition-opacity duration-1000">
            <img src="https://raw.githubusercontent.com/PruthviHG/lofi-website/9f93176abf5146529d13a5d6693ec4bbe8840948/images/arttower-architecture-3204688.jpg" class="absolute w-full h-full object-cover brightness-[0.6] z-[1]">
            <button onclick="closeRooms()" class="absolute top-6 left-6 z-[100] text-white font-mono border border-white/30 px-4 py-2 text-xs tracking-widest rounded bg-black/50 hover:bg-white hover:text-black transition">EXIT ROOMS</button>
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-[2] flex flex-wrap gap-5 justify-center max-w-[900px] w-[90%]" id="rooms-gallery-grid"></div>
        </div>

        <div id="rooms-video-view" class="r-hidden absolute inset-0 transition-opacity duration-1000">
            <video id="rooms-video-player" class="w-full h-full object-cover" loop muted playsinline></video>
            <canvas id="firefly-canvas" class="absolute inset-0 w-full h-full z-[15] pointer-events-none"></canvas>
            
            <div class="absolute top-6 left-6 z-[20] flex gap-3">
                <button class="rooms-icon-btn" id="rooms-back-btn" title="Back to Gallery"><i class="fas fa-arrow-left"></i></button>
                <button class="rooms-icon-btn hidden" id="rooms-next-scene-btn" title="Next Scene in Room"><i class="fas fa-step-forward"></i></button>
            </div>
        </div>

        <div id="rooms-music-player" class="absolute z-[30] flex items-center">
            <button class="text-white/70 hover:text-cyan-400 transition-colors cursor-pointer" onclick="prevTrack()"><i class="fas fa-backward"></i></button>
            <button class="text-white/70 hover:text-cyan-400 transition-colors cursor-pointer" id="rooms-local-play"><i class="fas fa-pause"></i></button>
            <button class="text-white/70 hover:text-cyan-400 transition-colors cursor-pointer" onclick="nextTrack()"><i class="fas fa-forward"></i></button>
        </div>
    </div>

    <div id="game-modal">
        <div class="top-nav">
            <div class="nav-btn font-mono" id="back-to-menu-btn" style="display:none;" onclick="showMenu()">&lt; HUB</div>
            <div class="nav-btn font-mono" onclick="closeArcade()">EXIT GAMES</div>
        </div>
        <div id="arcade-view" class="flex flex-col items-center w-full">
            <div class="arcade-title font-mono text-cyan-400 shadow-cyan-400">MINDSENCE GAMES</div>
            <div id="arcade-menu">
                <button class="arcade-btn btn-surge font-mono" onclick="prepareGame('surge')">NEON SURGE <span class="btn-desc">Dodge geometry</span></button>
                <button class="arcade-btn btn-snake font-mono" onclick="prepareGame('snake')">QUANTUM SNAKE <span class="btn-desc">Collect data</span></button>
                <button class="arcade-btn btn-defend font-mono" onclick="prepareGame('defend')">PULSE DEFENDER <span class="btn-desc">Shoot anomalies</span></button>
                <button class="arcade-btn btn-breaker font-mono" onclick="prepareGame('breaker')">NEON BREAKER <span class="btn-desc">Paddle physics</span></button>
                <button class="arcade-btn btn-dash font-mono" onclick="prepareGame('dash')">HYPER DASH <span class="btn-desc">Tunnel navigation</span></button>
                <button class="arcade-btn btn-flow font-mono" onclick="prepareGame('flow')">DATA LINK <span class="btn-desc">Connect nodes</span></button>
                <button class="arcade-btn btn-hike font-mono" onclick="prepareGame('hike')">ZEN HIKE <span class="btn-desc">WASD to explore</span></button>
                <button class="arcade-btn btn-farm font-mono" onclick="prepareGame('farm')">NEON FARM <span class="btn-desc">Plant and harvest</span></button>
                <button class="arcade-btn btn-breathe font-mono" onclick="prepareGame('breathe')">BOX BREATHING <span class="btn-desc">Find your center</span></button>
                <button class="arcade-btn btn-yoga font-mono" onclick="prepareGame('yoga')" style="background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?auto=format&fit=crop&q=80&w=400'); background-size: cover; background-position: center;">DESK YOGA <span class="btn-desc">Stretch & release</span></button>
            </div>
        </div>
        <div id="game-container">
            <div style="position: relative; width: 100%;">
                <div id="game-intro-screen">
                    <h2 id="intro-title" class="intro-title font-mono"></h2>
                    <div class="intro-desc-box">
                        <div class="intro-icon">ℹ️</div>
                        <h3 class="text-cyan-400 font-bold mb-2 font-mono text-sm tracking-widest">HOW TO PLAY</h3>
                        <p id="intro-desc" class="text-gray-300 font-mono text-xs leading-relaxed"></p>
                    </div>
                    <button id="start-game-btn" class="arcade-btn font-mono" style="width: auto; padding: 15px 40px; font-size: 16px;" onclick="startGameReal()">START SEQUENCE</button>
                </div>
                <canvas id="game-canvas" width="800" height="500"></canvas>
                <div id="game-over-screen">
                    <h2 id="game-over-title" class="text-3xl md:text-5xl font-black text-red-500 mb-2 md:mb-4 tracking-widest drop-shadow-lg text-center font-mono">SESSION ENDED</h2>
                    <p id="final-score" class="text-xl md:text-2xl text-white mb-6 md:mb-8 font-bold font-mono">SCORE: 0</p>
                    <button id="retry-btn-dynamic" class="arcade-btn" style="width: auto; padding: 10px 20px;" onclick="retryGame()">RETRY SEQUENCE</button>
                </div>
            </div>
            <p id="game-score" class="text-xl md:text-2xl text-white mt-4 font-bold tracking-widest font-mono" style="display: none;">SCORE: 0</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
